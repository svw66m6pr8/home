<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>犬ゲーセン</title>
<style>
  /* ============================================================
     ここより下の GAMES 配列だけ編集すれば新しいゲームが増やせます。
     ============================================================ */
</style>
</head>
<body>

<!-- ============================================================
     ゲーム一覧データ (ここに追加していくだけでOK)
     ============================================================
     id     : 何でもよい一意の文字列
     title  : ゲームタイトル
     kana   : ふりがな/読み(小さく添える)
     genre  : "ACTION" | "PUZZLE" | "SLOT" など好きな文字列
     desc   : 一言説明(1〜2行推奨)
     url    : 公開URL
     new    : true にすると "NEW" バッジが付く(省略可)
============================================================ -->
<script id="games-data" type="application/json">
[
  {
    "id": "jomonshiba",
    "title": "縄文柴伝説",
    "kana": "じょうもんしばでんせつ",
    "genre": "ACTION",
    "desc": "十字ボタンで攻撃方向を入力し、野良犬から暴走族まで連続コンボで叩きのめす和風アクション。",
    "url": "https://svw66m6pr8.github.io/jomonshiba/"
  },
  {
    "id": "tetris",
    "title": "ユトリス",
    "kana": "ゆとりす",
    "genre": "PUZZLE",
    "desc": "犬モチーフの落ち物パズル。iPhoneタッチ操作に最適化、ホールド機能つき。",
    "url": "https://svw66m6pr8.github.io/tetris/"
  },
  {
    "id": "wanpara",
    "title": "祖デチパラダイス",
    "kana": "そでちぱらだいす",
    "genre": "SLOT",
    "desc": "犬モチーフのSTモードを搭載したパチスロシミュレーター。オリジナルリール&LCD演出。",
    "url": "https://svw66m6pr8.github.io/wanpara/"
  }
]
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&family=Shippori+Mincho:wght@600;800&family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root{
    --bg-0:#12111a;
    --bg-1:#1a1830;
    --gold:#e3b23c;
    --gold-soft:#f2d68f;
    --vermilion:#c8483a;
    --paper:#f4ecd8;
    --ink:#100e1a;
    --line: rgba(227,178,60,0.28);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 700px at 15% -10%, rgba(200,72,58,0.20), transparent 60%),
      radial-gradient(900px 600px at 110% 10%, rgba(227,178,60,0.14), transparent 55%),
      var(--bg-0);
    color: var(--paper);
    font-family:'Noto Sans JP', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    padding-bottom: 64px;
  }

  /* --- 提灯風ヘッダー --- */
  header{
    position:relative;
    padding: 56px 24px 44px;
    text-align:center;
    overflow:hidden;
    border-bottom: 1px solid var(--line);
  }
  header::before{
    content:"";
    position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 64px);
    pointer-events:none;
  }
  .eyebrow{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:12px;
    letter-spacing:0.35em;
    color: var(--gold-soft);
    opacity:0.8;
    margin:0 0 14px;
  }
  h1{
    font-family:'Shippori Mincho', serif;
    font-weight:800;
    font-size: clamp(40px, 11vw, 68px);
    margin:0;
    color: var(--paper);
    letter-spacing:0.06em;
    text-shadow: 0 0 24px rgba(227,178,60,0.35);
  }
  h1 .paw{
    display:inline-block;
    color: var(--gold);
    transform: translateY(-2px) rotate(-8deg);
    margin-right:6px;
  }
  .tagline{
    margin: 16px auto 0;
    max-width: 520px;
    font-size: 14px;
    line-height:1.9;
    color: rgba(244,236,216,0.72);
  }
  .count-badge{
    display:inline-block;
    margin-top:22px;
    padding: 6px 16px;
    border:1px solid var(--line);
    border-radius: 999px;
    font-size:12px;
    letter-spacing:0.12em;
    color: var(--gold-soft);
    font-family:'Zen Kaku Gothic New', sans-serif;
  }

  main{
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 20px 0;
  }

  /* --- 筐体カード --- */
  .shelf{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 22px;
  }

  .cabinet{
    position:relative;
    background: linear-gradient(180deg, #201c34 0%, #16142a 100%);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px 22px 24px;
    display:flex;
    flex-direction:column;
    gap:14px;
    text-decoration:none;
    color:inherit;
    isolation:isolate;
    overflow:hidden;
    transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease;
  }
  .cabinet::before{
    /* マーブル電球のライン */
    content:"";
    position:absolute; top:0; left:0; right:0; height:3px;
    background: repeating-linear-gradient(90deg, var(--gold) 0 6px, transparent 6px 14px);
    opacity:0.55;
  }
  .cabinet:hover, .cabinet:focus-visible{
    transform: translateY(-4px);
    border-color: rgba(227,178,60,0.6);
    box-shadow: 0 18px 40px -18px rgba(227,178,60,0.35);
    outline:none;
  }

  .cab-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
  }
  .genre-tag{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:10.5px;
    letter-spacing:0.16em;
    font-weight:700;
    padding:4px 9px;
    border-radius:5px;
    white-space:nowrap;
    color: var(--ink);
    background: var(--gold-soft);
  }
  .genre-tag[data-g="SLOT"]{ background:#e79a9a; }
  .genre-tag[data-g="ACTION"]{ background:#8fd3c4; }
  .genre-tag[data-g="PUZZLE"]{ background:#f2d68f; }

  .new-badge{
    font-size:9.5px;
    letter-spacing:0.1em;
    font-weight:700;
    color: var(--vermilion);
    border:1px solid var(--vermilion);
    border-radius:999px;
    padding:2px 8px;
  }

  .kana{
    font-size:11px;
    color: rgba(244,236,216,0.5);
    letter-spacing:0.05em;
  }
  .title{
    font-family:'Shippori Mincho', serif;
    font-weight:800;
    font-size: 24px;
    margin:2px 0 0;
    color: var(--paper);
  }
  .desc{
    font-size:13px;
    line-height:1.85;
    color: rgba(244,236,216,0.68);
    flex:1;
    margin:0;
  }
  .cab-foot{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding-top:10px;
    border-top: 1px dashed rgba(244,236,216,0.15);
  }
  .play-label{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:12.5px;
    font-weight:700;
    letter-spacing:0.08em;
    color: var(--gold-soft);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .play-label .arrow{ transition: transform .2s ease; }
  .cabinet:hover .play-label .arrow{ transform: translateX(4px); }
  .slot-no{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:11px;
    color: rgba(244,236,216,0.35);
  }

  footer{
    text-align:center;
    margin-top:56px;
    font-size:11.5px;
    color: rgba(244,236,216,0.35);
    letter-spacing:0.05em;
  }

  @media (prefers-reduced-motion: reduce){
    .cabinet, .play-label .arrow { transition:none; }
  }
</style>

<header>
  <p class="eyebrow">DOG ARCADE COLLECTION</p>
  <h1><span class="paw">🐾</span>犬ゲーセン</h1>
  <p class="tagline">柴犬たちが主役の自作ブラウザゲーム置き場。<br>タップしてそのまま遊べます。</p>
  <span class="count-badge" id="count-badge">- TITLES</span>
</header>

<main>
  <div class="shelf" id="shelf"></div>
  <footer>更新のたびに筐体が増えます。</footer>
</main>

<script>
(function(){
  const games = JSON.parse(document.getElementById('games-data').textContent);
  const shelf = document.getElementById('shelf');
  const countBadge = document.getElementById('count-badge');

  countBadge.textContent = games.length + ' TITLES';

  games.forEach((g, i) => {
    const a = document.createElement('a');
    a.className = 'cabinet';
    a.href = g.url;
    a.target = '_blank';
    a.rel = 'noopener';

    a.innerHTML = `
      <div class="cab-top">
        <span class="genre-tag" data-g="${g.genre || ''}">${g.genre || 'GAME'}</span>
        ${g.new ? '<span class="new-badge">NEW</span>' : ''}
      </div>
      <div>
        <p class="kana">${g.kana || ''}</p>
        <h2 class="title">${g.title}</h2>
      </div>
      <p class="desc">${g.desc || ''}</p>
      <div class="cab-foot">
        <span class="slot-no">No.${String(i + 1).padStart(2, '0')}</span>
        <span class="play-label">あそぶ <span class="arrow">→</span></span>
      </div>
    `;
    shelf.appendChild(a);
  });
})();
</script>

</body>
</html>
